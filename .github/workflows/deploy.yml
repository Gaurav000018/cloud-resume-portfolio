name: CI/CD Portfolio Deployment

on:
  push:
    branches:
      - main
  workflow_dispatch: # Allows manual trigger from GitHub UI

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/portfolio-website

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: actions/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,value=sha-${{ github.sha }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Copy docker-compose.yml to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "docker-compose.yml"
          target: "~/portfolio/"

      - name: SSH and Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # Create portfolio directory if it doesn't exist
            mkdir -p ~/portfolio
            cd ~/portfolio
            
            # Authenticate Docker daemon to GHCR on EC2 using a personal access token (PAT)
            # stored in GitHub Secrets. Alternatively, if the package is public, login is not needed.
            if [ ! -z "${{ secrets.GHCR_PAT }}" ]; then
              echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            fi
            
            # Update docker-compose.yml to reference the registry image instead of build context
            # We do this dynamically by updating the image name in the copied docker-compose.yml file.
            sed -i 's|build:|# build:|g' docker-compose.yml
            sed -i 's|context:|# context:|g' docker-compose.yml
            sed -i 's|dockerfile:|# dockerfile:|g' docker-compose.yml
            
            # Insert the registry image name
            if ! grep -q "image:" docker-compose.yml; then
              # Inject registry image reference right after container_name
              sed -i '/container_name: portfolio-website/a \    image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest' docker-compose.yml
            fi
            
            # Pull the latest image
            docker compose pull
            
            # Spin up the containers
            docker compose up -d --remove-orphans
            
            # Clean up old unused images
            docker image prune -af
